name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate extension entrypoint
        run: node --check ./extension.js

      - name: Build VSIX
        run: npm run package

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: rksync-*.vsix
          generate_release_notes: true
