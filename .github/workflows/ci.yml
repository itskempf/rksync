name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate extension entrypoint
        run: node --check ./extension.js

      - name: Build VSIX
        run: npm run package

      - name: Upload VSIX artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rksync-vsix
          path: rksync-*.vsix
